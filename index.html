<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSense Pro v3</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f8ef7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockSense">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS — DARK (default) ────────────────── */
:root{
  --bg:#060810;--s1:#0b0d18;--s2:#0f1220;--s3:#141828;--s4:#1a2035;
  --b1:#1e2540;--b2:#252e50;--b3:#2e3a60;
  --ac:#4f8ef7;--ac2:#7c6af7;--ac3:#38d9a9;
  --grn:#22c55e;--red:#f05252;--yel:#fbbf24;--orn:#f97316;--cyn:#22d3ee;--pink:#ec4899;
  --t1:#f0f4ff;--t2:#c8d3f0;--t3:#7888b0;--t4:#4a5578;
  --font:'Cabinet Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Clash Display',sans-serif;
  --radius:10px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --glow-ac:0 0 20px rgba(79,142,247,.2);
  --card-bg:var(--s1);
  --row-hover:rgba(255,255,255,.03);
}

/* ── TOKENS — LIGHT (Tickertape-inspired) ───── */
[data-theme="light"]{
  --bg:#f0f4f9;--s1:#ffffff;--s2:#f7f9fc;--s3:#eef1f8;--s4:#e4e9f4;
  --b1:#dde3ef;--b2:#c8d0e4;--b3:#a0aec0;
  --ac:#2563eb;--ac2:#7c3aed;--ac3:#059669;
  --grn:#15803d;--red:#dc2626;--yel:#b45309;--orn:#ea580c;--cyn:#0891b2;--pink:#be185d;
  --t1:#0f172a;--t2:#1e293b;--t3:#475569;--t4:#94a3b8;
  --shadow:0 1px 8px rgba(0,0,0,.08),0 4px 24px rgba(0,0,0,.06);
  --glow-ac:0 0 0 3px rgba(37,99,235,.15);
  --card-bg:#ffffff;
  --row-hover:rgba(37,99,235,.04);
}
[data-theme="light"] body::after{display:none;}
[data-theme="light"] #topnav{box-shadow:0 1px 4px rgba(0,0,0,.08);}
[data-theme="light"] .sc{box-shadow:0 1px 4px rgba(0,0,0,.06);}
[data-theme="light"] .pn{box-shadow:0 1px 4px rgba(0,0,0,.06);}
[data-theme="light"] .tbl tr:hover td{background:var(--row-hover);}
[data-theme="light"] .ai-box{background:linear-gradient(135deg,rgba(37,99,235,.04),rgba(124,58,237,.05));border-color:rgba(124,58,237,.18);}

/* ── THEME TOGGLE ────────────────────────────── */
#theme-toggle{position:fixed;bottom:80px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:4999;box-shadow:var(--shadow);transition:all .2s;}
#theme-toggle:hover{transform:scale(1.1);border-color:var(--ac);}

/* ── AI INVESTOR CHATBOX ─────────────────────── */
#chat-fab{position:fixed;bottom:130px;right:18px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#7c3aed);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;z-index:4999;box-shadow:0 4px 20px rgba(79,142,247,.45);transition:all .25s;color:#fff;}
#chat-fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(79,142,247,.6);}
#chat-fab .chat-fab-badge{position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);display:none;}
#chat-panel{position:fixed;bottom:0;right:18px;width:390px;max-width:calc(100vw - 24px);height:560px;background:var(--s1);border:1px solid var(--b2);border-bottom:none;border-radius:16px 16px 0 0;z-index:5100;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.5);transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);overflow:hidden;}
#chat-panel.open{transform:translateY(0);}
.chat-header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;background:var(--s2);border-bottom:1px solid var(--b2);flex-shrink:0;}
.chat-header-icon{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--ac),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.chat-header-info{flex:1;min-width:0;}
.chat-header-title{font-size:13px;font-weight:700;color:var(--t1);}
.chat-header-sub{font-size:10px;color:var(--t4);margin-top:1px;}
.chat-header-actions{display:flex;gap:6px;}
.chat-hbtn{background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;padding:4px 6px;border-radius:6px;transition:all .15s;}
.chat-hbtn:hover{color:var(--t1);background:var(--s3);}
.chat-quickbar{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;border-bottom:1px solid rgba(255,255,255,.04);}
.chat-quickbar::-webkit-scrollbar{display:none;}
.chat-qbtn{background:var(--s2);border:1px solid var(--b2);color:var(--t2);font-size:10.5px;padding:5px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.chat-qbtn:hover{background:var(--ac);border-color:var(--ac);color:#fff;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.chat-bubble{max-width:88%;padding:9px 12px;border-radius:12px;font-size:12.5px;line-height:1.55;word-break:break-word;}
.chat-bubble.user{background:linear-gradient(135deg,var(--ac),#5b6ef5);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;}
.chat-bubble.ai{background:var(--s2);border:1px solid var(--b2);color:var(--t1);align-self:flex-start;border-bottom-left-radius:3px;}
.chat-bubble.ai strong{color:var(--ac);}
.chat-bubble.typing{background:var(--s2);border:1px solid var(--b2);align-self:flex-start;padding:10px 14px;}
.chat-typing-dots{display:flex;gap:4px;align-items:center;}
.chat-typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--t4);animation:typing-bounce .9s infinite;}
.chat-typing-dots span:nth-child(2){animation-delay:.15s;}
.chat-typing-dots span:nth-child(3){animation-delay:.3s;}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chat-footer{padding:10px 12px;border-top:1px solid var(--b2);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--s1);}
#chat-input{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--t1);border-radius:10px;padding:8px 12px;font-size:12.5px;font-family:var(--font);resize:none;min-height:38px;max-height:100px;outline:none;transition:border-color .15s;line-height:1.4;}
#chat-input:focus{border-color:var(--ac);}
#chat-input::placeholder{color:var(--t4);}
#chat-send{background:linear-gradient(135deg,var(--ac),#5b6ef5);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
#chat-send:hover{transform:scale(1.08);}
#chat-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:20px;text-align:center;}
.chat-empty-icon{font-size:40px;opacity:.5;}
.chat-empty-text{font-size:12px;color:var(--t4);line-height:1.5;}
[data-theme="light"] #chat-panel{box-shadow:0 -8px 40px rgba(0,0,0,.15);}
[data-theme="light"] .chat-bubble.ai{background:#f1f5f9;border-color:#e2e8f0;}

/* ── LOCK SCREEN ─────────────────────────────── */
body.app-locked>*:not(#lock-screen){filter:blur(14px) brightness(.55) saturate(.4);pointer-events:none;user-select:none;transition:filter .3s;}
#lock-screen{position:fixed;inset:0;z-index:19999;display:flex;align-items:center;justify-content:center;background:rgba(6,8,18,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:opacity .3s;}
#lock-screen.hidden{opacity:0;pointer-events:none;}
.lk-card{background:rgba(18,22,40,.92);border:1px solid rgba(79,142,247,.2);border-radius:24px;padding:36px 32px 28px;width:340px;max-width:calc(100vw - 32px);box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1px rgba(79,142,247,.08);display:flex;flex-direction:column;align-items:center;gap:0;backdrop-filter:blur(24px);}
.lk-logo{font-size:42px;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(79,142,247,.5));}
.lk-title{font-family:var(--display);font-weight:800;font-size:20px;color:#fff;letter-spacing:-.3px;}
.lk-subtitle{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px;margin-bottom:24px;text-align:center;line-height:1.5;}
.lk-pin-dots{display:flex;gap:14px;margin-bottom:6px;}
.lk-pd{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:transparent;transition:all .15s;}
.lk-pd.filled{background:var(--ac);border-color:var(--ac);box-shadow:0 0 10px rgba(79,142,247,.6);}
.lk-pd.error{background:#ef4444;border-color:#ef4444;animation:lk-shake .4s;}
@keyframes lk-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.lk-err{height:18px;font-size:11px;color:#ef4444;text-align:center;margin:6px 0 16px;font-weight:500;}
.lk-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.lk-key{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:14px;height:58px;font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none;-webkit-tap-highlight-color:transparent;}
.lk-key:hover{background:rgba(79,142,247,.2);border-color:rgba(79,142,247,.4);}
.lk-key:active{transform:scale(.93);background:rgba(79,142,247,.35);}
.lk-key.del{font-size:18px;color:rgba(255,255,255,.5);}
.lk-key.empty{background:transparent;border-color:transparent;cursor:default;}
.lk-key.empty:hover{background:transparent;border-color:transparent;}
.lk-actions{display:flex;justify-content:center;margin-top:20px;}
.lk-link{background:none;border:none;color:rgba(255,255,255,.35);font-size:11.5px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:color .15s;}
.lk-link:hover{color:rgba(255,255,255,.7);}
/* Recovery phrase display */
.lk-phrase-box{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);border-radius:12px;padding:14px 16px;width:100%;margin:12px 0 18px;text-align:center;}
.lk-phrase{font-family:var(--mono);font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;word-break:break-all;}
.lk-phrase-warn{font-size:10.5px;color:rgba(255,255,255,.4);margin-top:6px;line-height:1.45;}
.lk-btn{width:100%;background:linear-gradient(135deg,var(--ac),#5b6ef5);border:none;color:#fff;border-radius:12px;height:46px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px;}
.lk-btn:hover{opacity:.9;transform:translateY(-1px);}
.lk-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:10px;padding:10px 14px;font-size:14px;text-align:center;letter-spacing:2px;outline:none;margin-bottom:12px;}
.lk-input:focus{border-color:var(--ac);}
.lk-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:normal;}
[data-theme="light"] .lk-card{background:rgba(255,255,255,.96);border-color:rgba(79,142,247,.25);}
[data-theme="light"] .lk-key{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:#1e293b;}
[data-theme="light"] .lk-title{color:#1e293b;}
[data-theme="light"] .lk-subtitle{color:#64748b;}
[data-theme="light"] .lk-link{color:#94a3b8;}
[data-theme="light"] .lk-link:hover{color:#475569;}
[data-theme="light"] .lk-input{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.15);color:#1e293b;}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;overflow-x:hidden;font-size:15px;transition:background .3s,color .3s;}

/* grain overlay — dark only */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:.6;}

/* ── TOP NAV ────────────────────────────────────────── */
#topnav { position:fixed; top:0; left:0; right:0; z-index:1000; background:var(--s1); border-bottom:1px solid var(--b1); }
#tn-row1 { display:flex; align-items:center; padding:0 16px; height:50px; gap:12px; border-bottom:1px solid var(--b2); }
#tn-logo { display:flex; align-items:center; gap:8px; cursor:pointer; flex-shrink:0; }
#tn-logo-text { font-size:17px; font-weight:800; color:var(--t1); letter-spacing:-.3px; }
/* ── Scrolling indices marquee ──────────────────────────────── */
#tn-ticker { flex:1; overflow:hidden; position:relative; min-width:0; }
#tn-ticker::before, #tn-ticker::after {
  content:''; position:absolute; top:0; bottom:0; width:32px; z-index:2; pointer-events:none;
}
#tn-ticker::before { left:0; background:linear-gradient(to right, var(--s1), transparent); }
#tn-ticker::after  { right:0; background:linear-gradient(to left, var(--s1), transparent); }
.ix-scroll-track { display:flex; align-items:center; gap:0; animation:ixScroll 42s linear infinite; will-change:transform; }
.ix-scroll-track:hover { animation-play-state:paused; cursor:default; }
@keyframes ixScroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
.tn-ix { display:flex; flex-direction:column; align-items:center; padding:4px 16px; border-right:1px solid var(--b2); cursor:pointer; flex-shrink:0; transition:background .15s; min-width:96px; }
.tn-ix:hover { background:var(--s2); }
.tn-ix-name { font-size:9.5px; color:var(--t4); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.tn-ix-val { font-size:12.5px; font-family:var(--mono); font-weight:700; margin-top:1px; }
#tn-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
#tn-lastref { white-space:nowrap; }
/* Live P&L band */
#tn-pnl { display:flex; align-items:center; gap:10px; padding:0 14px; border-left:1px solid var(--b2); border-right:1px solid var(--b2); flex-shrink:0; height:100%; cursor:pointer; transition:background .15s; }
#tn-pnl:hover { background:var(--s2); }
.tn-pnl-item { display:flex; flex-direction:column; align-items:center; gap:0; }
.tn-pnl-lbl { font-size:8.5px; color:var(--t4); text-transform:uppercase; letter-spacing:.5px; font-weight:700; }
.tn-pnl-val { font-size:12px; font-family:var(--mono); font-weight:800; line-height:1.2; font-variant-numeric:tabular-nums; }
.tn-pnl-div { width:1px; height:22px; background:var(--b2); }
@media(max-width:900px) { #tn-pnl { display:none; } }

#tn-row2 { display:flex; align-items:center; padding:0 16px; height:40px; gap:2px; justify-content:space-between; }
#tn-tabs { display:flex; align-items:center; gap:2px; }
#tn-quick { display:flex; align-items:center; gap:1px; }
.tn-qa { background:none; border:none; font-size:15px; cursor:pointer; padding:4px 8px; border-radius:6px; color:var(--t4); transition:all .15s; line-height:1; }
.tn-qa:hover { background:var(--s2); color:var(--t1); }
.tn-qa.active { color:var(--ac); background:rgba(79,142,247,.1); }
@media(max-width:900px) { #tn-quick { display:none; } }
.tn-tab { padding:6px 14px; font-size:13px; font-weight:500; color:var(--t3); cursor:pointer; border-radius:6px; white-space:nowrap; transition:all .15s; user-select:none; }
.tn-tab:hover { color:var(--t1); background:var(--s2); }
.tn-tab.on { color:var(--ac); background:rgba(79,142,247,.1); }

/* Dropdown menus */
.tn-drop-wrap { position:relative; }
.tn-drop-wrap:hover .tn-drop,.tn-drop-wrap.open .tn-drop { display:block; }
.tn-drop { display:none; position:absolute; top:100%; left:0; background:var(--s1); border:1px solid var(--b1); border-radius:10px; min-width:190px; padding:6px; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:200; max-height:calc(100vh - 120px); overflow-y:auto; }
.tn-drop::-webkit-scrollbar{width:4px;} .tn-drop::-webkit-scrollbar-track{background:transparent;} .tn-drop::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px;}
.tn-drop-item { padding:8px 12px; font-size:12.5px; color:var(--t2); cursor:pointer; border-radius:6px; white-space:nowrap; transition:all .12s; }
.tn-drop-item:hover { background:var(--s2); color:var(--t1); }
.tn-drop-div { padding:8px 12px 3px; font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--t4); text-transform:uppercase; pointer-events:none; margin-top:4px; }
.tn-drop-div:first-child { margin-top:0; }
.tn-drop-sep { height:1px; background:var(--b2); margin:4px 8px; }

/* Main content area — full width, offset for top nav height */
/* Quick Jump Pinbar (row 3) */
#tn-row3 { display:flex; align-items:center; padding:0 14px; height:30px; gap:4px; border-top:1px solid var(--b2); overflow-x:auto; scrollbar-width:none; }
#tn-row3::-webkit-scrollbar { display:none; }
#tn-row3-label { font-size:9px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--t4); margin-right:4px; white-space:nowrap; flex-shrink:0; }
.tn-pin { padding:2px 10px; font-size:11px; color:var(--t3); cursor:pointer; border-radius:20px; border:1px solid var(--b2); background:transparent; white-space:nowrap; transition:all .12s; line-height:1.6; }
.tn-pin:hover { color:var(--t1); background:var(--s2); border-color:var(--ac); }
.tn-pin.on { color:var(--ac); border-color:rgba(79,142,247,.4); background:rgba(79,142,247,.08); font-weight:600; }
@media(max-width:900px) { #tn-row3 { display:none; } }
.main { margin-left:0 !important; padding-top:120px !important; min-height:100vh; display:flex; flex-direction:column; }

/* dot/clock kept for market status */
.dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:blink 2s infinite;}
.dot.off{background:var(--red);animation:none;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(45,211,111,.4)}60%{opacity:.6;box-shadow:0 0 0 5px transparent}}
.clock{font-family:var(--mono);font-size:11px;color:var(--t3);}

/* ── Dashboard Hero ───────────────────────────────────── */
#ds-hero { display:flex; align-items:center; background:var(--s1); border:1px solid var(--b1); border-radius:12px; margin-bottom:16px; overflow:hidden; position:relative; }
#ds-hero::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--ac),#22d3ee,#2dd36f); }
.dsh-stat { padding:16px 22px; flex:1; min-width:110px; }
.dsh-lbl { font-size:10.5px; color:var(--t4); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
.dsh-val { font-size:26px; font-weight:800; font-family:var(--mono); color:var(--t1); font-variant-numeric:tabular-nums; }
.dsh-sub { font-size:12px; color:var(--t3); margin-top:2px; font-family:var(--mono); }
.dsh-div { width:1px; background:var(--b1); align-self:stretch; margin:12px 0; }

/* ── AI Brief ─────────────────────────────────────────── */
#ds-brief-wrap { background:var(--s1); border:1px solid var(--b1); border-radius:12px; margin-bottom:16px; overflow:hidden; }
#ds-brief-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--b2); }
#ds-brief-body { padding:12px 16px; font-size:13px; line-height:1.7; color:var(--t2); }

/* ── Insights Strip ───────────────────────────────────── */
#ds-insights-row { display:grid; grid-template-columns:260px 1fr; gap:12px; margin-bottom:16px; }
#ds-donut-wrap { background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:14px 16px; }
#ds-donut-title { font-size:10px; font-weight:700; color:var(--t4); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:10px; }
#ds-donut-chart { width:110px; height:110px; border-radius:50%; margin:0 auto 10px; transition:background .4s; }
#ds-donut-legend { display:flex; flex-direction:column; gap:4px; }
.ds-dl { display:flex; align-items:center; gap:6px; font-size:11px; }
.ds-dl-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
#ds-insight-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.ds-ic { background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:14px 16px; transition:border-color .3s; }
.ds-ic-lbl { font-size:10px; font-weight:700; color:var(--t4); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.ds-ic-name { font-size:13px; font-weight:700; color:var(--t1); margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ds-ic-val { font-size:22px; font-weight:800; line-height:1.1; font-variant-numeric:tabular-nums; }
.ds-ic-sub { font-size:11px; color:var(--t4); margin-top:4px; }

/* ── Portfolio Overview ─────────────────────────────────── */
/* Smart LTCG alert */
#ds-ltcg-alert { background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(34,197,94,.06)); border:1px solid rgba(251,191,36,.35); border-radius:12px; padding:14px 18px; }
.ltcg-alert-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.ltcg-alert-title { font-size:13px; font-weight:700; color:var(--yel); }
.ltcg-alert-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-top:1px solid var(--b2); flex-wrap:wrap; }
.ltcg-chip { font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; background:rgba(251,191,36,.15); color:var(--yel); border:1px solid rgba(251,191,36,.3); white-space:nowrap; }
.ltcg-save { font-size:11px; font-weight:700; color:var(--grn); }

/* Quick Actions strip */
#ds-quick-actions { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
#ds-quick-actions::-webkit-scrollbar { display:none; }
.ds-qa-btn { display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; padding:10px 14px; background:var(--s1); border:1px solid var(--b1); border-radius:10px; cursor:pointer; font-size:11px; color:var(--t2); font-weight:600; transition:background .15s,border-color .15s,color .15s; white-space:nowrap; }
.ds-qa-btn:hover { background:var(--s2); border-color:var(--ac); color:var(--ac); }
.ds-qa-icon { font-size:18px; }

/* Today Panel */
#ds-today-panel { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
@media(max-width:600px){ #ds-today-panel { grid-template-columns:1fr; } }
.dtp-card { background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:14px 16px; }
.dtp-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--t4); margin-bottom:10px; }
.dtp-mover { display:flex; align-items:center; gap:8px; padding:5px 0; border-bottom:1px solid var(--bdr); }
.dtp-mover:last-child { border-bottom:none; }
.dtp-mover-sym { font-weight:700; font-size:12px; min-width:70px; }
.dtp-mover-name { font-size:10px; color:var(--t4); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dtp-mover-val { font-size:12px; font-weight:700; font-family:var(--mono); white-space:nowrap; }
.dtp-event { display:flex; gap:8px; padding:5px 0; border-bottom:1px solid var(--bdr); align-items:flex-start; }
.dtp-event:last-child { border-bottom:none; }
.dtp-event-ic { font-size:14px; line-height:1.4; }
.dtp-event-txt { font-size:11px; color:var(--t2); line-height:1.5; }
.dtp-event-when { font-size:10px; color:var(--t4); }
/* P&L attribution */
#ds-pnl-attr { margin-bottom:14px; background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:14px 16px; }
.attr-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--t4); margin-bottom:10px; }
.attr-bar-wrap { display:flex; flex-direction:column; gap:5px; }
.attr-row { display:flex; align-items:center; gap:8px; }
.attr-sym { font-size:11px; font-weight:600; width:64px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.attr-bar-bg { flex:1; height:7px; background:var(--s2); border-radius:4px; overflow:hidden; }
.attr-bar-fill { height:100%; border-radius:4px; transition:width .4s; }
.attr-val { font-size:10px; font-family:var(--mono); width:70px; text-align:right; flex-shrink:0; }
#ds-os-wrap { background:var(--s1); border:1px solid var(--b1); border-radius:12px; margin-bottom:16px; overflow:hidden; }
#ds-os-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 16px; border-bottom:1px solid var(--b2); }
.ds-os-title { font-size:14px; font-weight:800; color:var(--t1); }
.ds-os-sub { font-size:10.5px; color:var(--t4); margin-top:2px; }
#ds-os-body { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--b1); }
.ds-os-card { background:var(--s1); padding:13px 14px; min-height:96px; cursor:pointer; transition:background .15s,border-color .15s; }
.ds-os-card:hover { background:var(--s2); }
.ds-os-card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
.ds-os-card-name { font-size:11px; font-weight:800; color:var(--t2); text-transform:uppercase; letter-spacing:.55px; }
.ds-os-card-status { font-size:9px; font-weight:800; padding:2px 7px; border-radius:20px; border:1px solid var(--b2); color:var(--t4); white-space:nowrap; }
.ds-os-card-status.ready { color:var(--grn); border-color:rgba(45,211,111,.35); background:rgba(45,211,111,.08); }
.ds-os-card-status.warn { color:var(--yel); border-color:rgba(251,191,36,.35); background:rgba(251,191,36,.08); }
.ds-os-card-status.risk { color:var(--red); border-color:rgba(240,82,82,.35); background:rgba(240,82,82,.08); }
.ds-os-card-val { font-size:18px; font-weight:800; font-family:var(--mono); color:var(--t1); line-height:1.1; }
.ds-os-card-note { font-size:10.5px; color:var(--t4); margin-top:5px; line-height:1.35; }
.ds-os-disclosure { padding:9px 16px; border-top:1px solid var(--b2); font-size:10.5px; color:var(--t4); line-height:1.45; }
@media(max-width:1100px) { #ds-os-body { grid-template-columns:repeat(3,1fr); } }
@media(max-width:650px) { #ds-os-head { align-items:flex-start; flex-direction:column; } #ds-os-body { grid-template-columns:1fr 1fr; } .ds-os-card { min-height:88px; } }
@media(max-width:900px) { #ds-insights-row { grid-template-columns:1fr; } #ds-insight-cards { grid-template-columns:repeat(3,1fr); } }
@media(max-width:600px) { #ds-insight-cards { grid-template-columns:1fr 1fr; } }

/* ── Dashboard Grid ───────────────────────────────────── */
#ds-main-grid { display:grid; grid-template-columns:1fr 320px; gap:16px; }
#ds-left { min-width:0; }
#ds-right { display:flex; flex-direction:column; }
@media(max-width:1100px) { #ds-main-grid { grid-template-columns:1fr; } #ds-right { display:grid; grid-template-columns:1fr 1fr; gap:16px; } }
@media(max-width:700px) { #ds-main-grid { grid-template-columns:1fr; } #ds-right { grid-template-columns:1fr; } #ds-hero { flex-wrap:wrap; } .dsh-div { display:none; } }

/* Page title bar */
#pg-titlebar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
#pgTitle { font-size:22px; font-weight:800; color:var(--t1); letter-spacing:-.3px; }

/* Sticky holdings table header */
#holdThead th { position:sticky; top:0; background:var(--s1); z-index:10; box-shadow:0 1px 0 var(--b1); }
[data-theme="light"] #holdThead th { background:var(--s1); }

/* P&L row tinting */
.row-profit td:first-child { border-left:3px solid rgba(34,197,94,.5); }
.row-loss   td:first-child { border-left:3px solid rgba(239,68,68,.45); }
.row-profit { background:rgba(34,197,94,.02); }
.row-loss   { background:rgba(239,68,68,.02); }
.row-profit:hover td, .row-loss:hover td { background:rgba(79,142,247,.06) !important; }

/* Mobile sticky first column */
@media(max-width:768px){
  #holdThead th:first-child, #holdTbody td:first-child {
    position:sticky; left:0; z-index:5;
    background:var(--s1);
  }
  #holdTbody .row-profit td:first-child { background:rgba(6,8,16,.98); }
  #holdTbody .row-loss   td:first-child { background:rgba(6,8,16,.98); }
  [data-theme="light"] #holdThead th:first-child,
  [data-theme="light"] #holdTbody td:first-child { background:#fff; }
}

/* Actions overflow menu */
.act-more { position:relative; display:inline-flex; }
.act-more-drop { display:none; position:absolute; right:0; top:calc(100% + 4px); background:var(--s2); border:1px solid var(--b2); border-radius:9px; min-width:176px; z-index:200; box-shadow:var(--shadow); overflow:hidden; }
.act-more:hover .act-more-drop, .act-more:focus-within .act-more-drop { display:block; }
.act-more-item { padding:8px 14px; font-size:12px; color:var(--t2); cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:9px; transition:background .1s; border-bottom:1px solid var(--b1); }
.act-more-item:last-child { border-bottom:none; }
.act-more-item:hover { background:var(--s3); color:var(--t1); }
.act-more-icon { font-size:13px; width:16px; text-align:center; flex-shrink:0; }

/* Better section padding */
.sec { padding:16px 20px; }
@media(max-width:768px) { .sec { padding:12px 12px; } #tn-ticker { display:none; } }

/* Mobile market strip — visible only when ticker is hidden */
#mob-mkt-strip { display:none; background:var(--s1); border-bottom:1px solid var(--b1); padding:5px 14px; gap:14px; align-items:center; overflow-x:auto; scrollbar-width:none; }
#mob-mkt-strip::-webkit-scrollbar { display:none; }
.mob-ix { display:flex; align-items:center; gap:6px; flex-shrink:0; font-size:11.5px; cursor:pointer; }
.mob-ix-name { color:var(--t4); font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:.4px; }
.mob-ix-val { font-family:var(--mono); font-weight:700; font-size:12px; font-variant-numeric:tabular-nums; }
@media(max-width:768px) { #mob-mkt-strip { display:flex; } }

/* ── BUTTONS ─────────────────────────────────── */
.btn{padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;letter-spacing:.2px;}
.btn-p{background:var(--ac);color:#fff;}
.btn-p:hover{background:#3b7af0;transform:translateY(-1px);box-shadow:var(--glow-ac);}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--b2);}
.btn-g:hover{border-color:var(--ac);color:var(--ac);}
.btn-grn{background:rgba(45,211,111,.12);color:var(--grn);border:1px solid rgba(45,211,111,.25);}
.btn-red{background:rgba(240,82,82,.1);color:var(--red);border:1px solid rgba(240,82,82,.2);}
.btn-yel{background:rgba(251,191,36,.1);color:var(--yel);border:1px solid rgba(251,191,36,.2);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-xs{padding:2px 7px;font-size:10px;}

/* ── SECTIONS ─────────────────────────────────── */
.sec{display:none;padding:16px 20px;flex:1;animation:fu .25s ease;}
.sec.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.sec-title{font-family:var(--display);font-size:18px;font-weight:600;}

/* ── CARDS ─────────────────────────────────── */

.sg-5{grid-template-columns:repeat(5,1fr);}
.sg-4{grid-template-columns:repeat(4,1fr);}
.sg-3{grid-template-columns:repeat(3,1fr);}
.sg-2{grid-template-columns:1fr 1fr;}
