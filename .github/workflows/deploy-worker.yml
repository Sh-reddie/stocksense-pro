name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'price-sync-v11.js'
      - 'wrangler-price-sync.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy stocksense-price-sync
        run: npx --yes wrangler@3 deploy -c wrangler-price-sync.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
