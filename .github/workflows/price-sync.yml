name: Price Sync

on:
  schedule:
      - cron: '*/15 3-10 * * 1-5'
        workflow_dispatch:

        jobs:
          sync-prices:
              runs-on: ubuntu-latest
                  timeout-minutes: 8

                      steps:
                            - uses: actions/checkout@v4

                                  - uses: actions/setup-node@v4
                                          with:
                                                    node-version: '20'

                                                          - name: Fetch prices to Cloudflare KV
                                                                  run: node .github/scripts/price-sync.js
                                                                          env:
                                                                                    CF_ACCOUNT_ID:      ${{ secrets.CF_ACCOUNT_ID }}
                                                                                              CF_API_TOKEN:       ${{ secrets.CF_API_TOKEN }}
                                                                                                        CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
                                                                                                        
