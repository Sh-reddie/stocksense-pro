name: Deploy stocksense-price-sync Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 41c97ea0c974f951982f87a7bfa4a767
          command: deploy price-sync-v10.js --name stocksense-price-sync --compatibility-date 2024-01-01
